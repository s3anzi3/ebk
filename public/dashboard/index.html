<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0e1c" />
  <meta name="description" content="Your EBK dashboard — games played, streaks, best scores and top sport." />
  <title>Your Dashboard · EBK</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/home.css" />
  <link rel="stylesheet" href="/css/team.css" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">
      <span class="wordmark" aria-label="EBK">E<span>B</span>K</span>
      <span class="brand-sub">Elite Ball Knowledge</span>
    </a>
  </header>
  <main>
    <section class="hero wrap" style="padding-bottom: var(--sp-md)">
      <h1 class="rise" id="hello">Your Dashboard</h1>
      <p class="rise d1" id="subline">Your stats across every game and sport.</p>
    </section>
    <div class="wrap">
      <div id="signedout" hidden class="center" style="padding:var(--sp-lg) 0">
        <p class="muted">Sign in to track your games, streaks and best scores.</p>
        <button class="hero-cta" id="signin-cta">Sign in / Sign up</button>
      </div>
      <div id="loading" class="muted center" style="padding:var(--sp-lg) 0">Loading…</div>
      <div id="stats" hidden>
        <div class="stat-cards" id="cards"></div>
        <h2 class="dash-h">By sport</h2>
        <div class="stat-cards" id="bysport"></div>
        <h2 class="dash-h">Every game</h2>
        <div class="table-wrap">
          <table class="tbl"><thead><tr><th>Sport</th><th>Game</th><th>Best</th><th>Plays</th><th>Avg</th></tr></thead>
          <tbody id="gametable"></tbody></table>
        </div>
        <p id="empty" class="muted center" hidden style="padding:var(--sp-lg)">No games yet — go play and your stats will appear here.</p>
      </div>
    </div>
  </main>
  <script src="/js/catalog.js"></script>
  <script src="/js/ebk-ui.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
